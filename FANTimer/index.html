<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=2.0"> 
    <title>FAN Timer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.3.js"></script>
</head>
<body>
    <h1>FAN TIMER</h1>
    <form id="ui_form">
        <div id="options_container">
            <div id="hw_options" class="options">
                <p>HW</p>
                    <div class="option_set">
                        <p class="option_set_title">Bath Temp (C°):</p>
                        <input id="hw_100" name="hw_temp" type="radio" value="100" checked>    
                        <label for="hw_100">100</label>
                        <input id="hw_90" name="hw_temp" type="radio" value="90">    
                        <label for="hw_90">90</label>
                    </div>
                    <div class="option_set">
                        <label for="hw_duration">Duration (m):</label>
                        <input type="number" name="hw_dur" id="hw_duration" value="16">
                    </div>  
            </div>
            <div id="cw_options" class="options">
                <p>CW</p>
                    <div class="option_set">
                        <p class="option_set_title">Bath Temp (C°):</p>
                        <input id="cw_20" name="cw_temp" type="radio" value="20" checked>    
                        <label for="cw_20">20</label>
                        <input id="cw_0" name="cw_temp" type="radio" value="0">    
                        <label for="cw_0">0</label>
                    </div>
                    <div class="option_set">
                        <label for="cw_duration">Duration (m):</label>
                        <input type="number" name="cw_dur" id="cw_duration" value="20">
                        <label for="cw_inital_temp">Initial Temp(C°):</label>
                        <input type="number" name="cw_inital_temp" id="cw_inital_t" value="20">
                        <label for="cw_final_temp">Final Temp(C°):</label>
                        <input type="number" name="cw_final_temp" id="cw_final_t" value="25">
                    </div>
            </div>
            <div id="other_options" class="options">
                <p>Other Values:</p>
                <label for="ambient_temp">Ambient Temp (C°):</label>
                <input type="number" name="ambient_temp" id="ambient_t" value="22.2"><br>
                <label for="centrifuge_time_s">Centrifuge Time(s):</label>
                <input type="number" name="centrifuge_time_s" id="centrifuge_time" value="10"><br>
                <label for="centrifuge_rcf">Centrifuge rcf:</label>
                <input type="number" name="centrifuge_rcf" id="rectrifuge_r" value="2.5">
            </div>
            <div id="lot_options" class="options">
                <p>Lot Values:</p>
                <label for="standard_lot">Standard Lot:</label>
                <input type="text" name="standard_lot" id="standard_l" value="SWK260319-3">
                <label for="ninhydrin_lot">Ninhydrin Lot:</label>
                <input type="text" name="ninhydrin_lot" id="ninhydrin_l" value="NCR260316">
                <label for="dilution_lot">Dilution Lot:</label>
                <input type="text" name="dilution_lot" id="dilution_l" value="DIL260316">
            </div> 
            <div id="alarm_options" class="options">
                <p>Alarm Options</p>
                <label for="ten_minute_cw_left">10m CW Alarm:</label><br>
                <input type="checkbox" name="ten_minute_cw_left" id="ten_minute_cw_l" checked>
            </div>
        </div>
        <div id="lower_grid">
            <div id="button_container">
                <input type="button" name="start_hw_bath" id="start_hw_bath" value="Start HW Bath">
                <input type="button" name="start_cw_bath" id="start_cw_bath" value="Start CW Bath" disabled>
                <input type="button" name="stop_cw_bath" id="stop_cw_bath" value="Stop CW Bath" disabled>
                <input type="button" name="export_data" id="export_data" value="Copy Data" disabled>
            </div>
            <div id="timer_container">
                <div id="timer_value">Time Left:<br>x</div>
                <div id="clock_value">(10:40)</div>
            </div>
        </div>
        
    </form>
    <div id="export_content"></div>
    <script src="script.js" type="module"></script>
</body>
</html>
